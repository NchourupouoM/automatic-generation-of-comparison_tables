# .github/workflows/notify_team.yml
name: Email Team Notification on Push

on:
  push:
    # Vous pouvez restreindre à certaines branches (ex: main, dev) ou laisser vide pour toutes les branches
    branches:
      - main

jobs:
  notify:
    name: Send Commit Notification
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code (requis pour accéder au contexte du commit)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Envoi de l'e-mail via l'action communautaire de référence
      - name: Send Email to Pair Programming Team
        uses: dawidd6/action-send-mail@v4
        with:
          # Configuration du serveur SMTP (récupérée de manière sécurisée via les secrets)
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          
          # Destinataires (liste d'e-mails séparés par des virgules)
          to: ${{ secrets.TEAM_EMAILS }}
          
          # Expéditeur
          from: "GitHub Actions <${{ secrets.SMTP_USERNAME }}>"
          
          # Sujet du mail dynamique
          subject: "[GitHub Push] New commit detected on ${{ github.repository }}"
          
          # Corps du mail contenant le message du dernier commit
          body: |
            Hello Team,

            A new push has been detected on the repository ${{ github.repository }}.

            Event details:
            - Branch: ${{ github.ref_name }}
            - Author: ${{ github.event.head_commit.author.name }} (<${{ github.event.head_commit.author.email }}>)

            --------------------------------------------------
            LAST COMMIT MESSAGE:
            "${{ github.event.head_commit.message }}"
            --------------------------------------------------

            You can view the complete commit at the following address:
            ${{ github.event.head_commit.url }}

            Best regards,
            Automatic scientific Papers content extractor
          
          # Type de contenu (texte brut pour garantir la lisibilité sur tous les clients)
          content_type: text/plain